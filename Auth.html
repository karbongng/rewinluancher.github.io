<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewin Launcher - Discord Authentication</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1A1A1A 0%, #2D2D2D 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: #252525;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        .logo {
            font-size: 48px;
            font-weight: bold;
            color: #FF6B6B;
            margin-bottom: 20px;
        }
        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-radius: 50%;
            border-top-color: #FF6B6B;
            animation: spin 1s ease-in-out infinite;
            margin: 20px 0;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .success { color: #4CAF50; font-size: 48px; }
        .error { color: #f44336; font-size: 48px; }
        .button {
            background: #5865F2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 14px;
        }
        .button:hover {
            background: #4752C4;
        }
        code {
            background: #1A1A1A;
            padding: 10px;
            display: block;
            margin: 10px;
            border-radius: 5px;
            font-size: 12px;
            word-break: break-all;
        }
        .manual-input {
            margin-top: 20px;
            padding: 15px;
            background: #1A1A1A;
            border-radius: 8px;
        }
        input {
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 8px;
            border-radius: 4px;
            width: 80%;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">REWIN LAUNCHER</div>
        <div id="status">
            <div class="spinner"></div>
            <p>Authenticating with Discord...</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');

        function updateStatus(type, message, showManual = false, codeValue = null) {
            const statusDiv = document.getElementById('status');
            if (type === 'success') {
                statusDiv.innerHTML = `
                    <div class="success">✓</div>
                    <p class="success">${message}</p>
                    <p>Attempting to open Rewin Launcher...</p>
                    <div class="spinner"></div>
                `;
            } else if (type === 'error') {
                statusDiv.innerHTML = `
                    <div class="error">✗</div>
                    <p class="error">${message}</p>
                    <button class="button" onclick="window.close()">Close Window</button>
                `;
            } else if (showManual && codeValue) {
                statusDiv.innerHTML = `
                    <div class="info">⚠️</div>
                    <p>${message}</p>
                    <div class="manual-input">
                        <p>Copy this code and paste it in the launcher:</p>
                        <code>${codeValue}</code>
                        <button class="button" onclick="navigator.clipboard.writeText('${codeValue}')">Copy Code</button>
                    </div>
                    <button class="button" onclick="window.close()">Close Window</button>
                `;
            } else {
                statusDiv.innerHTML = `
                    <div class="info">⚠️</div>
                    <p>${message}</p>
                    <button class="button" onclick="window.close()">Close Window</button>
                `;
            }
        }

        if (error) {
            updateStatus('error', `Discord authentication failed: ${error}`);
        } else if (code) {
            updateStatus('success', 'Authentication successful!');
            
            // Try multiple methods to open the launcher
            setTimeout(() => {
                // Method 1: Custom protocol
                window.location.href = `rewinlauncher://auth/callback?code=${code}`;
                
                // Method 2: Try to focus existing window
                setTimeout(() => {
                    updateStatus('info', 'If launcher doesn\'t open automatically, please copy this code:', true, code);
                }, 2000);
            }, 1000);
        } else {
            updateStatus('error', 'No authorization code received.');
        }
    </script>
</body>
</html>
